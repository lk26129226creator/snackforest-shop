<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>訂單摘要 - SnackForest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/frontend/client/css/client.css">
    <link rel="stylesheet" href="/frontend/client/css/client.mobile.css" media="(max-width: 991.98px)">
</head>
<body>
    <main id="main-content" class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                <h1 class="h4 mb-3">訂單摘要</h1>
                <div id="order-summary-container" class="card mb-3">
                    <div class="card-body">
                        <form id="order-summary-form">
                            <div id="order-items-list" class="mb-3">
                                <!-- items rendered here -->
                            </div>
                            <hr>
                            <div class="mb-2">
                                <div class="d-flex justify-content-between"><div>商品小計</div><div id="order-subtotal">NT$0.00</div></div>
                                <div class="d-flex justify-content-between"><div>運費</div><div id="order-shipping">NT$0.00</div></div>
                                <div class="d-flex justify-content-between fw-bold fs-5 mt-2"><div>總計</div><div id="order-total">NT$0.00</div></div>
                            </div>
                            <hr>
                            <h6 class="mb-2">運送與付款</h6>
                            <div class="mb-3">
                                <label for="shipping-method" class="form-label">運送方式</label>
                                <select id="shipping-method" class="form-select"></select>
                            </div>
                            <div class="mb-3">
                                <label for="payment-method" class="form-label">付款方式</label>
                                <select id="payment-method" class="form-select"></select>
                            </div>
                            <hr>
                            <h6 class="mb-2">收件人資訊</h6>
                            <div class="mb-3">
                                <label for="recipient-name" class="form-label">姓名</label>
                                <input type="text" id="recipient-name" name="recipient-name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="recipient-address" class="form-label">地址</label>
                                <input type="text" id="recipient-address" name="recipient-address" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="recipient-phone" class="form-label">電話</label>
                                <input type="tel" id="recipient-phone" name="recipient-phone" class="form-control" required>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="cart.html" class="btn btn-secondary" id="back-to-cart">返回購物車</a>
                                <button id="confirm-order-btn" class="btn btn-success" type="submit">完成結帳</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/frontend/client/js/env.js"></script>
    <script src="/frontend/client/js/session.js"></script>
    <script src="/frontend/client/js/cart.js"></script>
    <script src="/frontend/client/js/order-summary.js"></script>
</body>
</html>
